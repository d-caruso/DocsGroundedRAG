<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta property="og:title" content="DocsGroundedRAG" />
    <meta
      property="og:description"
      content="Ask grounded questions over indexed documentation and inspect source-backed answers."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script data-mantine-script>
      try {
        var _colorScheme = window.localStorage.getItem('mantine-color-scheme-value');
        var colorScheme =
          _colorScheme === 'light' || _colorScheme === 'dark' || _colorScheme === 'auto' ? _colorScheme : 'auto';
        var computedColorScheme =
          colorScheme !== 'auto'
            ? colorScheme
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        document.documentElement.setAttribute('data-mantine-color-scheme', computedColorScheme);
      } catch (e) {}
    </script>
    <title>DocsGroundedRAG</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
